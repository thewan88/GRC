# ─── Internal GRC Application ─────────────────────────────────────────────────
# Served at: grc.internal.company.com (or localhost in dev)
# Routes:
#   /api/*          → Laravel backend (port 9000 PHP-FPM via fastcgi)
#   /*              → Next.js frontend (port 3000)

server {
    listen 80;
    server_name grc.internal.company.com localhost;

    # Redirect HTTP → HTTPS in production (comment out for local dev)
    # return 301 https://$host$request_uri;

    # For dev without TLS — serve directly
    include /etc/nginx/conf.d/grc_locations.conf;
}

