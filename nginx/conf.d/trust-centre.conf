# ─── Trust Centre (External-Facing Portal) ────────────────────────────────────
# Served at: trust.company.com
# This is the public compliance portal, similar to Vanta's trust page.
# External clients, auditors, and counterparties access this without Entra ID.
#
# Routes:
#   /api/v1/trust-centre/*  → Laravel backend
#   /*                      → Next.js /trust-centre/* pages

server {
    listen 80;
    server_name trust.company.com;

    # Security headers specific to public portal
    add_header X-Frame-Options "DENY" always;         # Stricter than internal
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self';" always;

    # Trust Centre API endpoints
    location /api/v1/trust-centre/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Sanctum CSRF (needed for access request form)
    location /sanctum/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Next.js handles all Trust Centre pages under /trust-centre/
    location / {
        proxy_pass         http://frontend:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
